<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Cédric Ragot - Sonothérapie et Massage Sonore</title>

    <meta
      name="description"
      content="Découvrez la sonothérapie et le massage sonore aux bols tibétains avec Cédric Ragot"
    />

    <!-- ========================================================= -->
    <!-- 🌐 POLICES PREMIUM -->
    <!-- ========================================================= -->
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Montserrat:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- ========================================================= -->
    <!-- 🎨 STYLE GLOBAL + BOTPRESS -->
    <!-- ========================================================= -->
    <style>
      :root {
        --bp-primary: #947f61 !important;
        --bp-accent: #947f61 !important;
      }

      html, body {
        margin: 0;
        padding: 0;
        background-color: #947f61;
        overflow-x: hidden;
      }

      body {
        font-family: 'Montserrat', sans-serif;
      }

      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        font-family: 'Cormorant Garamond', serif;
      }

      /* HEADER CHAT */
      .bpw-header-container {
        background-color: #947f61 !important;
      }

      /* BOUTON CHAT */
      .bpw-widget-btn {
        background-color: #947f61 !important;
        border-radius: 999px !important;
      }

      /* MESSAGES BOT */
      .bpw-from-bot .bpw-chat-bubble {
        background-color: #947f61 !important;
        color: #ffffff !important;
      }

      /* BOUTON ENVOI */
      .bpw-send-button {
        background-color: #947f61 !important;
      }

      /* INPUT CHAT */
      .bpw-composer textarea {
        border-color: #947f61 !important;
      }

      /* ICON CHAT */
      .bpw-widget-btn svg {
        fill: white !important;
      }
    </style>
  </head>

  <body>
    <!-- ROOT REACT -->
    <div id="root"></div>

    <!-- APP -->
    <script type="module" src="/src/main.tsx"></script>

    <!-- ========================================================= -->
    <!-- 🤖 BOTPRESS V3 -->
    <!-- ========================================================= -->
    <script>
  window.addEventListener("load", () => {
    setTimeout(() => {
      const script1 = document.createElement("script");
      script1.src = "https://cdn.botpress.cloud/webchat/v3.6/inject.js";
      document.body.appendChild(script1);

      script1.onload = () => {
        window.botpressWebChat = {
          botName: "Cédric Ragot",
          composerPlaceholder: "Posez votre question...",
          showPoweredBy: false,
          themeColor: "#947f61"
        };

        const script2 = document.createElement("script");
        script2.src = "https://files.bpcontent.cloud/2026/05/06/16/20260506163132-W93W6WRW.js";
        document.body.appendChild(script2);
      };
    }, 1500);
  });
</script>

  </body>
